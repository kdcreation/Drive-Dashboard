<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Dashboard</title>
    <style>
        body { margin: 0; padding: 20px; background: #cfd8e3; font-family: sans-serif; }
        .neumorphic-card { max-width: 850px; margin: 0 auto; background: #cfd8e3; padding: 25px; border-radius: 20px; box-shadow: 12px 12px 25px #a6b1bd, -12px -12px 25px #f8faff; }
        .drive-list { display: flex; flex-direction: column; gap: 12px; }
        .drive-item { background: #cfd8e3; padding: 12px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 5px 5px 10px #a6b1bd, -5px -5px 10px #f8faff; }
        .subject-info { display: flex; align-items: center; gap: 15px; }
        .sno-circle { background: #1e40af; color: white; min-width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }
        .subject-name { font-weight: 700; color: #1e293b; font-size: 16px; }
        .open-btn { background: #1e40af; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; box-shadow: 0 4px 0 #16318d; font-size: 12px; }
        .pending-text { color: #94a3b8; font-size: 12px; font-style: italic; }
    </style>
</head>
<body>

<div class="neumorphic-card">
    <h2 style="color: #1e293b; margin-bottom: 20px; border-left: 5px solid #1e40af; padding-left: 15px;">Departmental Drives</h2>
    <div id="driveList" class="drive-list">Loading...</div>
</div>

  
<script>
    // APNA CSV LINK YAHAN DALEIN
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0jaUi9O3yoLIjjJ0QqzfKdNSXFOoUqjLsQy-1EDiN_S-WpqEl8V3aqVNCuvRI9mnmwvadyxIa0SvK/pub?output=csv';

    async function loadSheetData() {
        const listDiv = document.getElementById('driveList');
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            
            // Proper CSV Parsing: Ye commas aur quotes ko sahi se handle karega
            const rows = text.trim().split(/\r?\n/).slice(1); 
            listDiv.innerHTML = '';

            rows.forEach(line => {
                // Ye split logic handles commas inside links
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (cols.length >= 2) {
                    const sno = cols[0].replace(/"/g, "").trim();      // Column A: S/No.
                    const subject = cols[1].replace(/"/g, "").trim();  // Column B: Drive/Position Name
                    const link = cols[2] ? cols[2].replace(/"/g, "").trim() : ""; // Column C: Link

                    if (subject) {
                        const item = document.createElement('div');
                        item.className = 'drive-item';
                        
                        const actionHTML = (link && link.startsWith('http')) 
                            ? `<a href="${link}" target="_blank" class="open-btn">GO</a>`
                            : `<span class="pending-text">Link Not Provided</span>`;

                        item.innerHTML = `
                            <div class="subject-info">
                                <div class="sno-circle">${sno}</div>
                                <div class="subject-name">${subject}</div>
                            </div>
                            <div>${actionHTML}</div>
                        `;
                        listDiv.appendChild(item);
                    }
                }
            });
        } catch (e) {
            listDiv.innerHTML = 'Error loading data.';
        }
    }
    loadSheetData();
</script>
</body>
</html>
